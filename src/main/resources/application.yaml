spring:
  application:
    name: harpa-api

  # connection database
  datasource:
    url: jdbc:postgresql://localhost:5432/harp_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

cloudflare:
  r2:
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    bucket: ${R2_BUCKET_NAME}
    endpoint: ${R2_ENDPOINT}
    public-url: ${R2_PUBLIC_URL}